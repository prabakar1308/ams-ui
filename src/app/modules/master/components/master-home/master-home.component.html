<div class="mt-6">
  <mat-tab-group dynamicHeight (selectedTabChange)="onTabChange($event)">
    <mat-tab [label]="masterTitle.USER">
      <div>
        <app-master-details [tabIndex]="tabIndex" />
      </div>
    </mat-tab>
    <mat-tab [label]="masterTitle.UNIT">
      <div><app-master-details [tabIndex]="tabIndex" /></div>
    </mat-tab>
  </mat-tab-group>
</div>
