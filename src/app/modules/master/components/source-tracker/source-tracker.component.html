<div>
  @if (userAction === userActions.LIST) {
    <app-generic-data
      [title]="'Input Source Tracker'"
      [data]="tableData"
      [displayColumns]="displayColumns"
      [showDateRange]="true"
      [showSearch]="true"
      [extraInfos]="extraInfos"
      (refreshPage)="getSourceTrackerDetails()"
      (addData)="addNew()"
      (editData)="editDetails($event)"
      (deleteData)="deleteDetails($event)"
      (applyFilter)="applyFilter($event)"
    ></app-generic-data>
  } @else if (userAction === userActions.ADD || userAction === userActions.EDIT) {
    <app-form-generator
      [formStructure]="formSTConfigData"
      [formDetails]="formSTDetails"
      [getRawData]="true"
      (moveBack)="moveBack()"
      (formData)="submitFormData($event)"
    />
  }
</div>
