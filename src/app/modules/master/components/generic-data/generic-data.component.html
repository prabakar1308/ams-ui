<div class="generic-container pt-4">
  <div class="flex w-full items-center">
    <div class="w-full flex-initial">
      <h4 class="text-xl pl-4 font-serif" style="color: #165d51">{{ title }}</h4>
    </div>
    <div class="flex flex-row justify-end items-start gap-4">
      <div>
        <button
          mat-mini-fab
          aria-label="Refresh"
          (click)="onRefresh()"
          class="primary"
          matTooltip="Refresh"
        >
          <mat-icon>sync</mat-icon>
        </button>
      </div>
      <div>
        <button
          mat-mini-fab
          aria-label="Create User"
          (click)="onAdd()"
          matTooltip="Create"
          class="secondary"
        >
          <mat-icon>add_circle</mat-icon>
        </button>
      </div>
    </div>
  </div>
  <div class="pt-2">
    <mat-card appearance="outlined">
      <mat-card-content>
        <app-generic-table
          [data]="data"
          [displayedColumns]="displayColumns"
          [showPagination]="true"
          (editData)="onEditDetails($event)"
          (deleteData)="onDeleteDetails($event)"
        >
        </app-generic-table>
      </mat-card-content>
    </mat-card>
  </div>
</div>
