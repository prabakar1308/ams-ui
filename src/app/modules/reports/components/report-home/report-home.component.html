<div>
  <div class="flex flex-col md:flex-row justify-between pt-8 px-4">
    <div class="flex flex-col md:flex-row items-center gap-3">
      <app-date-range-picker
        [value]="dateValue"
        (selectionChange)="dateChange($event)"
      ></app-date-range-picker>
      <mat-form-field appearance="outline" class="ams-small w-64">
        <mat-label>Unit Sectors</mat-label>
        <mat-select
          name="unit sector"
          (selectionChange)="onUnitSectorChange($event.value)"
          [(value)]="selectedUnitSector"
        >
          @for (unit of unitSectors; track unit) {
            <mat-option [value]="unit.id">{{ unit.name }}</mat-option>
          }
        </mat-select>
      </mat-form-field>
    </div>
    @if (selectedIndex === 0) {
      <button mat-flat-button (click)="generatePDF()" class="primary mx-10 my-4 md:mx-0 md:my-0">
        Generate PDF
      </button>
    }
  </div>

  <mat-tab-group dynamicHeight (selectedIndexChange)="onIndexChange($event)">
    <mat-tab label="Total Artemia">
      <div class="mat-elevation-z4 m-4 p-4" id="contentToConvert">
        <app-total-artemia-report
          [liveTransits]="filteredLiveTransits"
          [frozenTransits]="filteredFrozenTransits"
          [dateValue]="dateValue"
        />
      </div>
    </mat-tab>
    <mat-tab label="Live Artemia">
      <div class="mat-elevation-z4 m-4">
        <!-- @if (selectedIndex === 1) { -->
        <app-live-artemia-report
          [unitId]="unitIds.MILLIONS"
          [dateValue]="dateValue"
          [data]="filteredLiveTransits"
        ></app-live-artemia-report>
        <!-- } -->
      </div>
    </mat-tab>
    <mat-tab label="Frozen Artemia">
      <div class="mat-elevation-z4 m-4">
        <!-- @if (selectedIndex === 2) { -->
        <app-live-artemia-report
          [unitId]="unitIds.FROZEN_CUPS"
          [dateValue]="dateValue"
          [data]="filteredFrozenTransits"
        ></app-live-artemia-report>
        <!-- } -->
      </div>
    </mat-tab>

    <mat-tab label="Stock Inputs">
      <div class="mat-elevation-z4">
        <!-- @if (selectedIndex === 3) { -->
        <app-stock-input-report [dateValue]="dateValue"></app-stock-input-report>
        <!-- } -->
      </div>
    </mat-tab>
  </mat-tab-group>
</div>
