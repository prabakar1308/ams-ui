<div>
  <div class="flex flex-col md:flex-row justify-between pt-8 px-4">
    <app-date-range-picker
      [value]="dateValue"
      (selectionChange)="dateChange($event)"
    ></app-date-range-picker>
    <button mat-flat-button (click)="generateReport()" class="primary">Generate Report</button>
  </div>

  <mat-tab-group dynamicHeight (selectedIndexChange)="onIndexChange($event)">
    <mat-tab label="Live Artemia">
      <div class="mat-elevation-z4 m-4">
        @if (selectedIndex === 0) {
          <app-live-artemia-report
            [unitId]="unitIds.MILLIONS"
            [dateValue]="dateValue"
          ></app-live-artemia-report>
        }
      </div>
    </mat-tab>
    <mat-tab label="Frozen Cups">
      <div class="mat-elevation-z4 m-4">
        @if (selectedIndex === 1) {
          <app-live-artemia-report
            [unitId]="unitIds.FROZEN_CUPS"
            [dateValue]="dateValue"
          ></app-live-artemia-report>
        }
      </div>
    </mat-tab>

    <mat-tab label="Restock">
      <div class="example-large-box mat-elevation-z4">Large content</div>
    </mat-tab>

    <mat-tab label="Harvest">
      <div class="example-large-box mat-elevation-z4">Large content</div>
    </mat-tab>
  </mat-tab-group>
</div>
