<h1 mat-dialog-title class="mb-8">{{ data.title }}</h1>
<mat-dialog-content>
  <div class="mb-16" [innerHTML]="data.message"></div>
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-button (click)="dialogRef.close(false)">Cancel</button>
  <button mat-raised-button (click)="dialogRef.close(true)" cdkFocusInitial>Ok</button>
</mat-dialog-actions>
