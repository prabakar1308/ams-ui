<div class="generic-table-container mat-elevation-z8 table-responsive">
  <table mat-table [dataSource]="dataSource" class="mat-table" matSort>
    <!-- Dynamic Column Definitions -->
    <ng-container *ngFor="let column of displayedColumns" [matColumnDef]="column">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>{{ column | underscoreTitlecase }}</th>

      <td mat-cell *matCellDef="let element">
        @if (column === 'actions' && element.enableEdit) {
          <div class="flex">
            <button
              mat-icon-button
              class="primary small"
              [matTooltip]="'Edit'"
              (click)="onEdit(element)"
            >
              <mat-icon>edit</mat-icon>
            </button>
            <button
              mat-icon-button
              class="warning small"
              [matTooltip]="'Delete'"
              (click)="onDelete(element)"
            >
              <mat-icon>delete</mat-icon>
            </button>
          </div>
        } @else {
          {{ element[column] }}
        }
      </td>
    </ng-container>

    <!-- Header Row -->
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

    <!-- Data Rows -->
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

    <tr class="mat-row" *matNoDataRow>
      <td [attr.colspan]="displayedColumns.length" class="p-4 text-center font-bold">
        No records available!
      </td>
    </tr>
  </table>

  <!-- Pagination -->
  <!-- <mat-paginator
      [length]="totalLength"
      [pageSize]="pageSize"
      [pageSizeOptions]="[5, 10, 25, 50]"
      (page)="onPageChange($event)">
    </mat-paginator> -->
</div>
